meta:
  profile: academic-paper
  theme: academic
  layout: vertical
  routing: orthogonal
  canvas: 1600x2672
  title: 登录认证与令牌续签流程图
  description: 论文流程图箭头规范修复版：连接点固定在节点边缘
nodes:
  - id: login
    label: 提交账号密码
    type: terminal
    size: xl
    position:
      x: 440
      'y': 130
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: verify
    label: 校验用户信息
    type: process
    size: xl
    position:
      x: 440
      'y': 330
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: issue
    label: 签发令牌
    type: process
    size: xl
    position:
      x: 440
      'y': 530
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: init
    label: 保存令牌并加载菜单
    type: process
    size: xl
    position:
      x: 420
      'y': 740
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: api
    label: 携带 Token 访问接口
    type: process
    size: xl
    position:
      x: 420
      'y': 970
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: unauth
    label: 收到 401?
    type: decision
    size: xl
    position:
      x: 440
      'y': 1200
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: refresh
    label: 调用刷新接口
    type: process
    size: xl
    position:
      x: 1080
      'y': 1210
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: rotated
    label: 刷新成功?
    type: decision
    size: xl
    position:
      x: 1080
      'y': 1430
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: retry
    label: 更新令牌并重放请求
    type: process
    size: xl
    position:
      x: 1060
      'y': 1680
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: logout
    label: 清理令牌并返回登录页
    type: process
    size: xl
    position:
      x: 1060
      'y': 2080
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
  - id: done
    label: 继续访问页面
    type: terminal
    size: xl
    position:
      x: 440
      'y': 2410
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.4
      fontSize: 10
