meta:
  profile: academic-paper
  theme: academic
  layout: vertical
  routing: orthogonal
  canvas: 900x1360
  title: 调拨执行流程图
  description: 调拨单在推荐、审批、执行和签收之间的状态推进流程
nodes:
  - id: start
    label: 创建调拨单
    type: terminal
    size: large
    position:
      x: 450
      'y': 80
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: recommend
    label: |-
      选择目标仓
      参考候选来源仓
    type: process
    size: xl
    position:
      x: 450
      'y': 240
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: submit
    label: 提交调拨单
    type: process
    size: large
    position:
      x: 450
      'y': 400
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: approve
    label: 审批人审核
    type: process
    size: large
    position:
      x: 450
      'y': 560
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: pass
    label: 审批通过？
    type: decision
    size: large
    position:
      x: 450
      'y': 720
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: reject
    label: 驳回并结束
    type: process
    size: xl
    position:
      x: 710
      'y': 720
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: execute
    label: |-
      执行调拨
      同步两端库存
    type: process
    size: xl
    position:
      x: 450
      'y': 920
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: receive
    label: 调入仓签收
    type: process
    size: large
    position:
      x: 450
      'y': 1080
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: end
    label: 状态为 RECEIVED
    type: terminal
    size: large
    position:
      x: 450
      'y': 1240
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
edges:
  - from: start
    to: recommend
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: recommend
    to: submit
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: submit
    to: approve
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: approve
    to: pass
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: pass
    to: reject
    type: primary
    label: 否
    labelPosition: end
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: pass
    to: execute
    type: primary
    label: 是
    labelPosition: start
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: execute
    to: receive
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: receive
    to: end
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
modules: []
