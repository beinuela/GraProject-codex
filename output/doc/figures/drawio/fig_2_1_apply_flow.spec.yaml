meta:
  profile: academic-paper
  theme: academic
  layout: vertical
  routing: orthogonal
  canvas: 900x1500
  title: 申领审批闭环流程图
  description: 部门用户、审批人和仓库管理员围绕申领单状态推进的闭环流程
nodes:
  - id: start
    label: 创建申领单
    type: terminal
    size: large
    position:
      x: 450
      'y': 80
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: draft
    label: 保存草稿
    type: process
    size: large
    position:
      x: 450
      'y': 220
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: submit
    label: 提交申领单
    type: process
    size: large
    position:
      x: 450
      'y': 360
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: urgent
    label: 紧急等级≥2？
    type: decision
    size: large
    position:
      x: 450
      'y': 500
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: approve
    label: 审批人审核
    type: process
    size: xl
    position:
      x: 190
      'y': 690
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: fast
    label: 快速审批
    type: process
    size: xl
    position:
      x: 710
      'y': 690
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: pass
    label: 审批通过？
    type: decision
    size: large
    position:
      x: 450
      'y': 900
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: reject
    label: 驳回并记录意见
    type: process
    size: xl
    position:
      x: 710
      'y': 900
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: stockout
    label: |-
      库存匹配
      批次出库
    type: process
    size: xl
    position:
      x: 450
      'y': 1100
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: receive
    label: 部门用户签收
    type: process
    size: xl
    position:
      x: 450
      'y': 1260
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
  - id: end
    label: 状态为 RECEIVED
    type: terminal
    size: large
    position:
      x: 450
      'y': 1410
    style:
      fillColor: '#FFFFFF'
      strokeColor: '#000000'
      fontColor: '#000000'
      strokeWidth: 1.6
      fontSize: 15
edges:
  - from: start
    to: draft
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: draft
    to: submit
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: submit
    to: urgent
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: urgent
    to: approve
    type: primary
    label: 否
    labelPosition: end
    waypoints:
      - x: 280
        'y': 560
      - x: 280
        'y': 690
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: urgent
    to: fast
    type: primary
    label: 是
    labelPosition: end
    waypoints:
      - x: 620
        'y': 560
      - x: 620
        'y': 690
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: approve
    to: pass
    type: primary
    waypoints:
      - x: 190
        'y': 760
      - x: 340
        'y': 760
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: fast
    to: pass
    type: primary
    waypoints:
      - x: 710
        'y': 760
      - x: 560
        'y': 760
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: pass
    to: reject
    type: primary
    label: 否
    labelPosition: end
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: pass
    to: stockout
    type: primary
    label: 是
    labelPosition: start
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: stockout
    to: receive
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
  - from: receive
    to: end
    type: primary
    style:
      strokeColor: '#000000'
      endArrow: block
      strokeWidth: 1.4
      fontColor: '#000000'
      fontSize: 12
modules: []
