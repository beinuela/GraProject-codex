spring:
  datasource:
    url: jdbc:h2:file:./tmp/h2/campus_material_screenshot;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: optional:classpath:schema-screenshot.sql
      data-locations: optional:classpath:data-screenshot.sql

security:
  jwt:
    secret: screenshot-local-jwt-secret-key-must-be-at-least-32-bytes
  cors:
    allowed-origins: http://localhost:5173

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
