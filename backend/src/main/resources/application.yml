server:
  port: 8080

spring:
  application:
    name: campus-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}

security:
  jwt:
    secret: ${JWT_SECRET:}
    access-expire-minutes: ${JWT_ACCESS_EXPIRE_MINUTES:30}
    refresh-expire-days: ${JWT_REFRESH_EXPIRE_DAYS:7}
    multi-device-login: ${JWT_MULTI_DEVICE_LOGIN:true}
    cleanup-cron: '${JWT_CLEANUP_CRON:0 0/30 * * * ?}'
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
